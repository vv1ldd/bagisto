version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    container_name: bagisto-app
    environment:
      APP_NAME: "${APP_NAME:-Bagisto}"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL}"
      APP_ADMIN_URL: "${APP_ADMIN_URL:-admin}"
      DB_CONNECTION: mysql
      DB_HOST: "${DB_HOST:-mysql}"
      DB_PORT: "${DB_PORT:-3306}"
      DB_DATABASE: "${DB_DATABASE:-bagisto}"
      DB_USERNAME: "${DB_USERNAME:-bagisto}"
      DB_PASSWORD: "${DB_PASSWORD:-password}"
      REDIS_HOST: "${REDIS_HOST:-redis}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-redispassword}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      MAIL_MAILER: "${MAIL_MAILER:-smtp}"
      MAIL_HOST: "${MAIL_HOST:-mailpit}"
      MAIL_PORT: "${MAIL_PORT:-1025}"
      SCOUT_DRIVER: "${SCOUT_DRIVER:-database}"
      ELASTICSEARCH_HOST: "${ELASTICSEARCH_HOST:-elasticsearch}"
      SESSION_DRIVER: "${SESSION_DRIVER:-redis}"
      CACHE_DRIVER: "${CACHE_DRIVER:-redis}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION:-redis}"
      BROADCAST_CONNECTION: "${BROADCAST_CONNECTION:-reverb}"
      REVERB_APP_ID: "${REVERB_APP_ID}"
      REVERB_APP_KEY: "${REVERB_APP_KEY}"
      REVERB_APP_SECRET: "${REVERB_APP_SECRET}"
      REVERB_HOST: "${REVERB_HOST}"
      REVERB_PORT: "${REVERB_PORT:-8088}"
      REVERB_SCHEME: "${REVERB_SCHEME:-http}"
      PUSHER_APP_ID: "${PUSHER_APP_ID}"
      PUSHER_APP_KEY: "${PUSHER_APP_KEY}"
      PUSHER_APP_SECRET: "${PUSHER_APP_SECRET}"
      PUSHER_HOST: "${PUSHER_HOST}"
      PUSHER_PORT: "${PUSHER_PORT:-8088}"
      PUSHER_SCHEME: "${PUSHER_SCHEME:-http}"
      PUSHER_APP_CLUSTER: "${PUSHER_APP_CLUSTER:-mt1}"
    expose:
      - "80"
    networks:
      - bagisto-network
      - coolify
    volumes:
      - 'bagisto-storage:/var/www/html/storage'
    depends_on:
      - elasticsearch
      - mailpit

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    container_name: bagisto-reverb
    entrypoint: [ "php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8088" ]
    environment:
      APP_NAME: "${APP_NAME:-Bagisto}"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL}"
      DB_CONNECTION: mysql
      DB_HOST: "${DB_HOST:-mysql}"
      DB_PORT: "${DB_PORT:-3306}"
      DB_DATABASE: "${DB_DATABASE:-bagisto}"
      DB_USERNAME: "${DB_USERNAME:-bagisto}"
      DB_PASSWORD: "${DB_PASSWORD:-password}"
      REVERB_APP_ID: "${REVERB_APP_ID}"
      REVERB_APP_KEY: "${REVERB_APP_KEY}"
      REVERB_APP_SECRET: "${REVERB_APP_SECRET}"
    ports:
      - "${REVERB_SERVER_PORT:-8088}:8088"
    networks:
      - bagisto-network
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.reverb.rule=Host(`ws.meanly.ru`)"
      - "traefik.http.routers.reverb.entrypoints=websecure"
      - "traefik.http.routers.reverb.tls=true"
      - "traefik.http.services.reverb.loadbalancer.server.port=8088"

  elasticsearch:
    image: 'docker.elastic.co/elasticsearch/elasticsearch:7.17.0'
    container_name: bagisto-elasticsearch
    restart: always
    environment:
      - xpack.security.enabled=false
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - 'bagisto-elasticsearch-data:/var/lib/elasticsearch/data'
    networks:
      - bagisto-network

  mailpit:
    image: 'axllent/mailpit:latest'
    container_name: bagisto-mailpit
    restart: always
    ports:
      - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
    networks:
      - bagisto-network


  livekit:
    image: livekit/livekit-server:latest
    container_name: bagisto-livekit
    restart: always
    entrypoint:
      - /bin/sh
      - -c
      - |
        cat <<EOF > /tmp/livekit.yaml
        port: 7880
        bind_addresses:
          - ""
        rtc:
          tcp_port: 7881
          port_range_start: 7882
          port_range_end: 7882
          use_external_ip: true
        redis:
          address: "$${REDIS_HOST:-redis}:$${REDIS_PORT:-6379}"
          password: "$${REDIS_PASSWORD}"
          db: 0
        keys:
          "$${LIVEKIT_API_KEY}": "$${LIVEKIT_API_SECRET}"
        logging:
          level: info
        EOF
        echo "--- Generated Config ---"
        cat /tmp/livekit.yaml
        /livekit-server --config /tmp/livekit.yaml
    # No volumes needed for config anymore, bypassing "is a directory" errors
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - bagisto-network
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.livekit.rule=Host(`livekit.meanly.ru`)"
      - "traefik.http.routers.livekit.entrypoints=websecure"
      - "traefik.http.routers.livekit.tls=true"
      - "traefik.http.services.livekit.loadbalancer.server.port=7880"

  coturn:
    image: coturn/coturn:latest
    container_name: bagisto-coturn
    restart: always
    # We use host networking for TURN to avoid NAT issues within Docker itself,
    # but since this is Coolify, we'll try standard port mapping first.
    # 3478 is the default port for STUN/TURN.
    ports:
      - "3478:3478"
      - "3478:3478/udp"
    command:
      - "turnserver"
      - "-L"
      - "0.0.0.0"
      - "-a"
      - "-v"
      - "-n"
      - "-u"
      - "${TURN_USERNAME:-meanly}:${TURN_PASSWORD:-meanly_secret}"
      - "-r"
      - "turn.meanly.ru"
      - "--realm=turn.meanly.ru"
      - "--use-auth-secret"
      - "--static-auth-secret=${TURN_SECRET:-meanly_secret_key}"
      - "--no-dtls"
      - "--no-tls"
    networks:
      - bagisto-network
      - coolify


networks:
  bagisto-network:
    driver: bridge
  coolify:
    external: true

volumes:

  bagisto-elasticsearch-data:
    driver: local
  bagisto-storage:
    driver: local

