version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    container_name: bagisto-app
    environment:
      APP_NAME: "${APP_NAME:-Bagisto}"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL}"
      APP_ADMIN_URL: "${APP_ADMIN_URL:-admin}"
      DB_CONNECTION: mysql
      DB_HOST: "${DB_HOST:-mysql}"
      DB_PORT: "${DB_PORT:-3306}"
      DB_DATABASE: "${DB_DATABASE:-bagisto}"
      DB_USERNAME: "${DB_USERNAME:-bagisto}"
      DB_PASSWORD: "${DB_PASSWORD:-password}"
      REDIS_HOST: "${REDIS_HOST:-redis}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-redispassword}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      MAIL_MAILER: "${MAIL_MAILER:-smtp}"
      MAIL_HOST: "${MAIL_HOST:-mailpit}"
      MAIL_PORT: "${MAIL_PORT:-1025}"
      SCOUT_DRIVER: "${SCOUT_DRIVER:-database}"
      ELASTICSEARCH_HOST: "${ELASTICSEARCH_HOST:-elasticsearch}"
      SESSION_DRIVER: "${SESSION_DRIVER:-redis}"
      CACHE_DRIVER: "${CACHE_DRIVER:-redis}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION:-redis}"
      BROADCAST_CONNECTION: "${BROADCAST_CONNECTION:-reverb}"
      REVERB_APP_ID: "${REVERB_APP_ID}"
      REVERB_APP_KEY: "${REVERB_APP_KEY}"
      REVERB_APP_SECRET: "${REVERB_APP_SECRET}"
      REVERB_HOST: "${REVERB_HOST}"
      REVERB_PORT: "${REVERB_PORT:-8088}"
      REVERB_SCHEME: "${REVERB_SCHEME:-http}"
      PUSHER_APP_ID: "${PUSHER_APP_ID}"
      PUSHER_APP_KEY: "${PUSHER_APP_KEY}"
      PUSHER_APP_SECRET: "${PUSHER_APP_SECRET}"
      PUSHER_HOST: "${PUSHER_HOST}"
      PUSHER_PORT: "${PUSHER_PORT:-8088}"
      PUSHER_SCHEME: "${PUSHER_SCHEME:-http}"
      PUSHER_APP_CLUSTER: "${PUSHER_APP_CLUSTER:-mt1}"
      ALCHEMY_RPC_URL: "${ALCHEMY_RPC_URL}"
      ADMIN_ETH_PRIVATE_KEY: "${ADMIN_ETH_PRIVATE_KEY}"
      MINT_CONTRACT_ADDRESS: "${MINT_CONTRACT_ADDRESS}"
    expose:
      - "80"
    networks:
      - bagisto-network
      - coolify
    volumes:
      - 'bagisto-storage:/var/www/html/storage'
    depends_on:
      - elasticsearch
      - mailpit

  # ---------------------------------------------------------------
  # One-shot service: deploy MeanlyGifts.sol to Arbitrum
  # Run manually:  docker compose run --rm deploy-contract
  # ---------------------------------------------------------------
  deploy-contract:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    container_name: bagisto-deploy-contract
    environment:
      ALCHEMY_RPC_URL:        "${ALCHEMY_RPC_URL}"
      ADMIN_ETH_PRIVATE_KEY:  "${ADMIN_ETH_PRIVATE_KEY}"
      ADMIN_ETH_PUBLIC_ADDRESS: "${ADMIN_ETH_PUBLIC_ADDRESS:-0xB1ABfEab7E90B8565F715871f8a0fF1B9FD9F9AA}"
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        HOME=/root
        FORGE="$HOME/.foundry/bin/forge"

        # Install forge if not present
        if [ ! -x "$$FORGE" ]; then
          echo "Installing Foundry..."
          curl -L https://foundry.paradigm.xyz | bash
          $$HOME/.foundry/bin/foundryup
        fi

        echo "Deploying MeanlyGifts.sol to Arbitrum..."
        $$FORGE create /var/www/html/contracts/MeanlyGifts.sol:MeanlyGifts \
          --rpc-url "$$ALCHEMY_RPC_URL" \
          --private-key "$$ADMIN_ETH_PRIVATE_KEY" \
          --constructor-args "$$ADMIN_ETH_PUBLIC_ADDRESS" \
          --broadcast

        echo ""
        echo "Copy the 'Deployed to: 0x...' address above into your .env as:"
        echo "MINT_CONTRACT_ADDRESS=0x..."
    networks:
      - bagisto-network

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    container_name: bagisto-reverb
    entrypoint: [ "php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8088" ]
    environment:
      APP_NAME: "${APP_NAME:-Bagisto}"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL}"
      DB_CONNECTION: mysql
      DB_HOST: "${DB_HOST:-mysql}"
      DB_PORT: "${DB_PORT:-3306}"
      DB_DATABASE: "${DB_DATABASE:-bagisto}"
      DB_USERNAME: "${DB_USERNAME:-bagisto}"
      DB_PASSWORD: "${DB_PASSWORD:-password}"
      REVERB_APP_ID: "${REVERB_APP_ID}"
      REVERB_APP_KEY: "${REVERB_APP_KEY}"
      REVERB_APP_SECRET: "${REVERB_APP_SECRET}"
    ports:
      - "${REVERB_SERVER_PORT:-8088}:8088"
    networks:
      - bagisto-network
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.reverb.rule=Host(`ws.meanly.ru`)"
      - "traefik.http.routers.reverb.entrypoints=websecure"
      - "traefik.http.routers.reverb.tls=true"
      - "traefik.http.services.reverb.loadbalancer.server.port=8088"

  elasticsearch:
    image: 'docker.elastic.co/elasticsearch/elasticsearch:7.17.0'
    container_name: bagisto-elasticsearch
    restart: always
    environment:
      - xpack.security.enabled=false
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - 'bagisto-elasticsearch-data:/var/lib/elasticsearch/data'
    networks:
      - bagisto-network

  mailpit:
    image: 'axllent/mailpit:latest'
    container_name: bagisto-mailpit
    restart: always
    ports:
      - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
    networks:
      - bagisto-network
  coturn:
    image: coturn/coturn:latest
    container_name: bagisto-coturn
    restart: always
    ports:
      - "3478:3478"
      - "3478:3478/udp"
    command:
      - "turnserver"
      - "-L"
      - "0.0.0.0"
      - "-a"
      - "-v"
      - "-n"
      - "-u"
      - "${TURN_USERNAME:-meanly}:${TURN_PASSWORD:-meanly_secret}"
      - "-r"
      - "turn.meanly.ru"
      - "--realm=turn.meanly.ru"
      - "--use-auth-secret"
      - "--static-auth-secret=${TURN_SECRET:-meanly_secret_key}"
      - "--no-dtls"
      - "--no-tls"
    networks:
      - bagisto-network
      - coolify




networks:
  bagisto-network:
    driver: bridge
  coolify:
    external: true

volumes:

  bagisto-elasticsearch-data:
    driver: local
  bagisto-storage:
    driver: local

